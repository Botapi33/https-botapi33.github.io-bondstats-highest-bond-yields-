name: Update Yield Curves

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run script
        env:
          BOND_API_KEY: ${{ secrets.BOND_API_KEY }}
          BOND_API_BASE_URL: ${{ secrets.BOND_API_BASE_URL }}
        run: python generate_yield_curves.py

      - name: Commit JSON
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add yield_curves.json
          git diff --cached --quiet || git commit -m "update yield curves"
          git push
